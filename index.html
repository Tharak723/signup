<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Signup</title>
</head>
<body>
   <header></header>
    <main class="man">
        <form>
            <h1 id="sign">Signup</h1>
           <input type="text" placeholder="Full Name" id="name" required>
            <div id="line"></div>

            <div><input type="email" placeholder="Email" id="email" required>
            <label for="email"></label><div id="line"></div></div>


            <div><input type="password" placeholder="password" id="password" required>
            <label for="password"></label><div id="line"></div></div>


            <div><input type="password" placeholder="Confirm Password" id="con-pass" required>
            <label for="con-pass"></label><div id="line"></div></div>


            <div><input type="date" placeholder="mm/dd/yyyy" id="dob" required>
            <label for="dob"></label><div id="line"></div>


            <div class="radio"><input type="radio" id="student" name="role" value="Student" required>
            <label for="student">Student</label>


            <input type="radio" id="employee" name="role" value="Employee" required>
            <label for="employee">Employee</label></div>
            
            <div class="checkbox"><label for="check">I agree to all the Terms and conditions</label>
            <input type="checkbox" id="check"></div>
            <button>Signup</button>
        </form>
    </main>
    <footer><p></p></footer>
    
    
</body>
</html>
